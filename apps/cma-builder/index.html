<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMA Builder — JackConnect</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e4e4e7; --muted: #71717a; --accent: #22c55e;
    --accent2: #3b82f6; --red: #ef4444; --yellow: #eab308;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 1100px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 0.6rem 0.8rem; font-size: 0.9rem; outline: none; transition: border 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  button { padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #16a34a; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #3a3d4a; }
  .actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
  td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .positive { color: var(--accent); }
  .negative { color: var(--red); }
  .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.75rem; }
  .stat { text-align: center; padding: 1rem; background: var(--bg); border-radius: 8px; }
  .stat-value { font-size: 1.75rem; font-weight: 700; }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  .badge-over { background: #22c55e20; color: var(--accent); }
  .badge-under { background: #ef444420; color: var(--red); }
  .badge-fair { background: #3b82f620; color: var(--accent2); }
  .preview { display: none; margin-top: 2rem; }
  .preview.show { display: block; }
  .preview-card { background: var(--card); border: 1px solid var(--accent); border-radius: 12px; padding: 2rem; max-width: 800px; }
  .preview-header { border-bottom: 2px solid var(--accent); padding-bottom: 1rem; margin-bottom: 1.5rem; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .row, .row3, .stats-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>🏠 CMA Builder</h1>
<p class="subtitle">Comparative Market Analysis for Jack Vanleur | Alpine Real Estate Companies</p>

<div class="grid">
  <div class="card">
    <div class="section-title">Subject Property</div>
    <div class="row3">
      <div><label>Street Address</label><input id="address" placeholder="123 Main St, Sioux Falls"></div>
      <div><label>City / ZIP</label><input id="city" placeholder="Sioux Falls, SD 57104"></div>
      <div><label>Beds / Baths</label><input id="beds" placeholder="4 bd | 3 ba"></div>
    </div>
    <div class="row">
      <div><label>Square Feet</label><input id="sqft" placeholder="2,400"></div>
      <div><label>Year Built</label><input id="year" placeholder="2018"></div>
    </div>
    <div class="row">
      <div><label>Lot Size</label><input id="lot" placeholder="0.28 acres"></div>
      <div><label>Garage</label><select id="garage"><option value="">Select...</option><option>Attached 2-Car</option><option>Attached 3-Car</option><option>Detached</option><option>None</option></select></div>
    </div>
    <div class="row">
      <div><label>List Price</label><input id="listPrice" placeholder="425000" type="number"></div>
      <div><label>Analysis Date</label><input id="analysisDate" type="date"></input></div>
    </div>
    <div class="section-title" style="margin-top:1rem;">Comparable Sales (3-5)</div>
    <div id="comps"></div>
    <button class="btn-secondary" onclick="addComp()" style="margin-top:0.75rem;">+ Add Comparable</button>
  </div>

  <div class="card">
    <div class="section-title">Market Summary</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-value" id="avgDom">—</div><div class="stat-label">Avg DOM</div></div>
      <div class="stat"><div class="stat-value" id="avgSPSF">—</div><div class="stat-label">Avg $/SF</div></div>
      <div class="stat"><div class="stat-value" id="overList">—</div><div class="stat-label">SP/LP Ratio</div></div>
      <div class="stat"><div class="stat-value" id="priceRange">—</div><div class="stat-label">Range</div></div>
    </div>
    <div class="section-title">Recommendation</div>
    <div id="recommendation" style="background:var(--bg);border-radius:8px;padding:1rem;font-size:0.9rem;line-height:1.6;"></div>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" onclick="generateCMA()">📊 Generate CMA Report</button>
  <button class="btn-secondary" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
  <button class="btn-secondary" onclick="downloadPDF()">💾 Download</button>
</div>

<div class="preview" id="preview">
  <div class="preview-card">
    <div class="preview-header">
      <strong>COMPARATIVE MARKET ANALYSIS</strong><br>
      <span id="previewAddress" style="font-size:1.1rem;"></span><br>
      <span id="previewDate" style="color:var(--muted);font-size:0.85rem;"></span>
    </div>
    <div id="previewContent"></div>
  </div>
</div>

<script>
let compCount = 0;
function addComp() {
  compCount++;
  const div = document.createElement('div');
  div.style='background:#16181f;border-radius:8px;padding:1rem;margin-bottom:0.75rem;';
  div.id='comp'+compCount;
  div.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;"><strong>Comp #'+compCount+'</strong><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;">×</button></div>'+
  '<div class="row"><div><label>Address</label><input id="c'+compCount+'addr" placeholder="456 Oak Ave, SF"></div><div><label>Sale Price</label><input id="c'+compCount+'sp" type="number" placeholder="410000"></div></div>'+
  '<div class="row"><div><label>Bedrooms</label><input id="c'+compCount+'bd" placeholder="4"></div><div><label>Baths</label><input id="c'+compCount+'ba" placeholder="3"></div></div>'+
  '<div class="row"><div><label>SQFT</label><input id="c'+compCount+'sf" placeholder="2350"></div><div><label>$/SQFT</label><input id="c'+compCount+'psf" type="number" step="0.01" placeholder="174"></div></div>'+
  '<div class="row"><div><label>DOM</label><input id="c'+compCount+'dom" placeholder="30"></div><div><label>Year Built</label><input id="c'+compCount+'yr" placeholder="2015"></div></div>';
  document.getElementById('comps').appendChild(div);
}
function get(id) { return document.getElementById(id); }
function gv(id) { return (get(id)||{}).value||''; }
function gvn(id) { return parseFloat(gv(id))||0; }
function calculate() {
  let totalDom=0, totalPsf=0, totalSp=0, count=0, minSp=Infinity, maxSp=0;
  const prices=[];
  for(let i=1;i<=compCount;i++) {
    const sp=gvn('c'+i+'sp'), sf=gvn('c'+i+'sf'), dom=gvn('c'+i+'dom'), psf=gvn('c'+i+'psf');
    if(sp>0) { totalSp+=sp; prices.push(sp); minSp=Math.min(minSp,sp); maxSp=Math.max(maxSp,sp); count++; }
    if(dom>0) totalDom+=dom;
    if(psf>0) totalPsf+=psf;
  }
  if(count===0) return;
  const avgDom=Math.round(totalDom/count);
  const avgPsf=(totalPsf/count).toFixed(0);
  const avgSp=totalSp/count;
  const lp=gvn('listPrice');
  const ratio=lp>0?((avgSp/lp)*100).toFixed(1)+'%':'—';
  const range=count>1?'$'+Math.round(minSp/1000)+'K-$'+Math.round(maxSp/1000)+'K':'$'+Math.round(avgSp/1000)+'K';
  get('avgDom').textContent=avgDom+'d';
  get('avgSPSF').textContent='$'+avgPsf;
  get('overList').textContent=ratio;
  get('priceRange').textContent=range;
  const subjSf=gvn('sqft');
  const lowEnd=Math.round((avgPsf*subjSf)/1000)*1000;
  const highEnd=Math.round((avgPsf*1.08*subjSf)/1000)*1000;
  const rec=lp>0?(avgSp<lp?'UNDER':'OVER')+'PRICED — ':'';
  get('recommendation').innerHTML=rec+'<strong>$'+Math.round(lowEnd/1000)+'K-$'+Math.round(highEnd/1000)+'K</strong> is the fair range based on '+count+' comparable sales averaging $'+avgPsf+'/SF with '+avgDom+' days on market.';
}
function generateCMA() {
  const addr=gv('address'), city=gv('city'), beds=gv('beds'), sqft=gv('sqft'), lp=gv('listPrice'), yr=gv('year'), dt=gv('analysisDate');
  if(!addr) { alert('Enter a subject property address first'); return; }
  let html='<table><thead><tr><th>#</th><th>Address</th><th>Sale Price</th><th>BD/BA</th><th>SF</th><th>$/SF</th><th>DOM</th><th>Year</th></tr></thead><tbody>';
  for(let i=1;i<=compCount;i++) {
    const a=gv('c'+i+'addr')||'—', sp=gv('c'+i+'sp')||'—', bd=gv('c'+i+'bd')||'—', ba=gv('c'+i+'ba')||'—';
    const sf=gv('c'+i+'sf')||'—', psf=gv('c'+i+'psf')||'—', dom=gv('c'+i+'dom')||'—', yr2=gv('c'+i+'yr')||'—';
    if(a!=='—') html+='<tr><td>'+i+'</td><td>'+a+'</td><td>$'+parseInt(sp).toLocaleString()+'</td><td>'+bd+'/'+ba+'</td><td>'+sf+'</td><td>$'+psf+'</td><td>'+dom+'</td><td>'+yr2+'</td></tr>';
  }
  html+='</tbody></table>';
  const subjSf=gvn('sqft'), subjPsf=lp>0&&subjSf>0?Math.round(lp/subjSf):0;
  html+='<div style="margin-top:1.5rem;padding:1rem;background:#16181f;border-radius:8px;"><strong>SUBJECT PROPERTY:</strong> '+addr+' | '+city+' | '+beds+' | '+sqft+' SF | Built '+yr+' | List: $'+parseInt(lp).toLocaleString()+' ($'+subjPsf+'/SF)</div>';
  get('previewAddress').textContent=addr;
  get('previewDate').textContent='Prepared: '+(dt||new Date().toLocaleDateString())+' | Alpine Real Estate Companies | Jack Vanleur';
  get('previewContent').innerHTML=html;
  get('preview').classList.add('show');
  calculate();
}
function copyToClipboard() {
  const addr=gv('address'), lp=gv('listPrice'), sf=gv('sqft'), comps=[];
  for(let i=1;i<=compCount;i++) { const sp=gv('c'+i+'sp'); if(sp) comps.push('Comp '+i+': $'+parseInt(sp).toLocaleString()); }
  const text='CMA Report\n'+addr+'\nList Price: $'+parseInt(lp).toLocaleString()+'\nSF: '+sf+'\n\nComparable Sales:\n'+comps.join('\n');
  navigator.clipboard.writeText(text).then(()=>alert('Copied to clipboard!'));
}
function downloadPDF() { alert('PDF download coming soon — for now use Copy to Clipboard'); }
document.getElementById('analysisDate').valueAsDate=new Date();
</script>
</body>
</html>
