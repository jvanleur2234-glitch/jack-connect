id: release-readiness-review
name: Release Readiness Review
enabled: true
schedule: 0 15 * * 4
provider: claude-code
adapterType: claude_local
ownerAgent: devops
agentSlug: devops
timeout: 600
prompt: |-
  Review the release checklist, active bug list, and current roadmap priorities.
  Write a release readiness review for Text Your Mom covering:
  - known blockers
  - rollback risk
  - notification reliability concerns
  - whether this build earns user trust
  Save the review in /release-checklist.
