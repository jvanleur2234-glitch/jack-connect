id: weekly-executive-brief
name: Weekly Executive Brief
enabled: true
schedule: 0 9 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: ceo
agentSlug: ceo
timeout: 600
prompt: |-
  Review the company strategy, goals, KPI pages, and all active child cabinet summaries.
  Write a sharp weekly executive brief for Text Your Mom that includes:
  - what changed this week
  - the biggest growth or retention signal
  - the top product risk
  - one decision leadership should make next
  Save the brief as a new page under /company/strategy or append to the latest weekly review page.
