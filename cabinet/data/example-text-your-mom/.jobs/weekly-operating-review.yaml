id: weekly-operating-review
name: Weekly Operating Review
enabled: true
schedule: 0 11 * * 1
provider: claude-code
adapterType: claude_local
ownerAgent: ceo
agentSlug: ceo
timeout: 600
prompt: |-
  Review the root cabinet plus every child cabinet for execution health.
  Summarize open bottlenecks, stale work, duplicate effort, and places where one team is blocked by another.
  Produce an operating review with:
  - wins
  - blockers
  - overdue items
  - one process fix to make this week
  Save the review to a company operations page.
cabinetPath: example-text-your-mom
createdAt: '2026-04-11T00:00:00.000Z'
updatedAt: '2026-04-11T00:00:00.000Z'
