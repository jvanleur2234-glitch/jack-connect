<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warp Ventures — Deal Flow</title>
<style>
  :root {
    --bg: #0d0d10; --surface: #16161a; --surface2: #1e1e24; --border: #2a2a35;
    --accent: #7c5cfc; --text: #e8e8f0; --muted: #888899;
    --green: #4ade80; --orange: #fb923c; --red: #f87171; --blue: #4fc3f7; --pink: #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .stats { display: flex; gap: 20px; font-size: 12px; color: var(--muted); }
  .stats strong { color: var(--text); }

  .board { display: flex; gap: 12px; padding: 16px; overflow-x: auto; flex: 1; align-items: flex-start; }

  .column { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 240px; flex-shrink: 0; display: flex; flex-direction: column; max-height: calc(100vh - 100px); }
  .col-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .col-count { background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }

  .cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }

  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .card-sector { font-size: 10px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
  .card-amount { color: var(--green); font-weight: 600; }
  .card-owner { background: var(--surface); color: var(--muted); padding: 2px 6px; border-radius: 10px; font-size: 10px; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .tag-ai { background: rgba(124,92,252,0.2); color: #b39dff; }
  .tag-climate { background: rgba(74,222,128,0.2); color: #86efac; }
  .tag-devtools { background: rgba(79,195,247,0.2); color: #7dd3fc; }
  .tag-saas { background: rgba(251,146,60,0.2); color: #fdba74; }
  .tag-fintech { background: rgba(244,114,182,0.2); color: #f9a8d4; }
  .tag-infra { background: rgba(248,113,113,0.2); color: #fca5a5; }
  .card-date { font-size: 10px; color: var(--muted); margin-top: 6px; }

  .col-sourcing .col-title { color: var(--muted); }
  .col-firstlook .col-title { color: var(--blue); }
  .col-partner .col-title { color: var(--accent); }
  .col-dd .col-title { color: var(--orange); }
  .col-termsheet .col-title { color: var(--green); }
  .col-closed .col-title { color: #a3e635; }
  .col-passed .col-title { color: var(--red); }

  /* Modal */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:20; align-items:center; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:480px; max-width:90vw; max-height:80vh; overflow-y:auto; padding:24px; }
  .modal h2 { font-size:16px; font-weight:700; margin-bottom:4px; }
  .modal .m-sector { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .modal .m-row { display:flex; gap:8px; margin-bottom:8px; font-size:13px; }
  .modal .m-label { color:var(--muted); min-width:100px; }
  .modal .m-val { color:var(--text); }
  .modal .m-notes { margin-top:12px; font-size:13px; line-height:1.6; color:var(--text); background:var(--surface2); border-radius:8px; padding:12px; }
  .modal-close { float:right; background:var(--surface2); border:1px solid var(--border); color:var(--text); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ <span>Warp Ventures</span> — Deal Flow Pipeline</h1>
  <div class="stats">
    <div>Active deals: <strong id="activeCount">—</strong></div>
    <div>Total pipeline: <strong id="totalAmount">—</strong></div>
    <div>Avg. check: <strong>$8.4M</strong></div>
  </div>
</div>

<div class="board" id="board"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
const DEALS = [
  // SOURCING
  { id:1, name:'Slate AI', stage:'sourcing', sector:'AI/ML · Series A', amount:'$12M', check:'$3M', owner:'Jordan', tags:['ai'], date:'Apr 10', source:'Inbound', summary:'Autonomous data labeling platform. 40 enterprise pilots. ARR not yet disclosed. Need: does this compete with NeuralFlow?', founders:'Aisha Torres, Wei Liang', traction:'40 enterprise pilots, Series A of $12M', concern:'Vertical overlap with NeuralFlow. Need competitive mapping.' },
  { id:2, name:'RootKit Dev', stage:'sourcing', sector:'Developer Tools · Seed', amount:'$5M', check:'$2M', owner:'Sam', tags:['devtools'], date:'Apr 11', source:'Intro via YC', summary:'Internal developer portal + runbooks automation. YC S25. 12 paying customers.', founders:'Marcus O\'Brien', traction:'12 paying customers, $60K ARR', concern:'Small team (2 eng). Differentiation from Backstage?' },
  { id:3, name:'Meridian Carbon', stage:'sourcing', sector:'Climate · Seed', amount:'$6M', check:'$2.5M', owner:'Rafael', tags:['climate'], date:'Apr 9', source:'LP referral (Crestview)', summary:'Direct air capture monitoring hardware for industrial sites.', founders:'Dr. Linnea Park, Omar Hassan', traction:'2 pilot sites, LOI from 1 Fortune 500', concern:'Hardware burn rate. How differentiated from GreenPulse?' },
  { id:4, name:'FlowBase', stage:'sourcing', sector:'Data Infra · Seed', amount:'$4M', check:'$2M', owner:'Jordan', tags:['infra'], date:'Apr 12', source:'Cold inbound', summary:'Event-driven data sync for multi-cloud data stacks. Solves "data freshness" for ML pipelines.', founders:'Yuki Tanaka', traction:'Beta, 8 design partners', concern:'Crowded space. Need to understand DataStream fit.' },

  // FIRST LOOK
  { id:5, name:'Synthica', stage:'firstlook', sector:'AI/ML · Series A', amount:'$18M', check:'$5M', owner:'Jordan', tags:['ai'], date:'Apr 7', source:'Sequoia pass', summary:'Synthetic data generation for regulated industries (healthcare, finance). $1.2M ARR growing 15% MoM.', founders:'Dr. Priya Subramanian, Kai Chen', traction:'$1.2M ARR, 8 enterprise customers', concern:'High R&D cost. Regulatory moat vs. commodity?' },
  { id:6, name:'Comet Build', stage:'firstlook', sector:'Developer Tools · Seed', amount:'$5M', check:'$2M', owner:'Sam', tags:['devtools'], date:'Apr 5', source:'TC Disrupt intro', summary:'AI-powered monorepo build system. 3x faster CI than Turborepo in benchmarks.', founders:'Anya Schmidt', traction:'Open source: 2K GitHub stars, 50 paying teams', concern:'Open-source monetization path is unclear.' },
  { id:7, name:'Verdant Grid', stage:'firstlook', sector:'Climate · Series A', amount:'$20M', check:'$4M', owner:'Rafael+Priya', tags:['climate'], date:'Apr 3', source:'Climate Week SF networking', summary:'AI-optimized microgrids for commercial real estate. $800K ARR. FEMA contract in pipeline.', founders:'James Osei, Dr. Fatima Al-Razi', traction:'$800K ARR, 12 CRE customers, FEMA LOI', concern:'Long sales cycles. Cap-intensive hardware component.' },

  // PARTNER MEETING
  { id:8, name:'Axon Finance', stage:'partner', sector:'Fintech · Series B', amount:'$30M', check:'$6M', owner:'Sam', tags:['fintech'], date:'Mar 28', source:'Goldman referral', summary:'AI-native FP&A platform for mid-market CFOs. $4.2M ARR, 110% NRR.', founders:'Elena Vasquez, Ravi Patel', traction:'$4.2M ARR, 110% NRR, 45 customers', concern:'MintLayer adjacency — need positioning clarity.' },
  { id:9, name:'Arch Deploy', stage:'partner', sector:'DevOps · Series A', amount:'$15M', check:'$4M', owner:'Jordan', tags:['devtools'], date:'Mar 25', source:'YC intro', summary:'Zero-downtime deployment orchestration. 90 enterprise customers. $2.1M ARR.', founders:'Tom Wu, Sandra Nkosi', traction:'$2.1M ARR, 90 customers, 98% retention', concern:'GitHub Actions + Copilot could compress this market.' },

  // DUE DILIGENCE
  { id:10, name:'Kairos Vision', stage:'dd', sector:'AI/ML · Series A', amount:'$22M', check:'$5M', owner:'Jordan+Maya', tags:['ai'], date:'Mar 15', source:'Andreessen pass (conflict)', summary:'Computer vision QA for manufacturing. $1.8M ARR, 200% YoY growth. Potential lead for Fund II flagship deal.', founders:'Dr. Amara Diallo, Hiro Nakamura', traction:'$1.8M ARR, 200% YoY, 14 manufacturing customers', concern:'Hardware integration complexity. Channel conflict with Tier 1 ERP vendors.' },

  // TERM SHEET
  { id:11, name:'Stackwise', stage:'termsheet', sector:'DevOps · Seed', amount:'$6M', check:'$3M', owner:'Sam', tags:['infra'], date:'Mar 5', source:'Warp Fellowship alumnus', summary:'Infrastructure cost optimization for Kubernetes. $180K ARR, growing 35% MoM. Term sheet sent Mar 30.', founders:'Preethi Kumar', traction:'$180K ARR, 35% MoM growth, 22 teams', concern:'None blocking — strong founder, clean cap table.' },

  // CLOSED
  { id:12, name:'NeuralFlow', stage:'closed', sector:'AI/ML · Series A', amount:'$18M', check:'$5M', owner:'Jordan', tags:['ai'], date:'Jan 2026', source:'YC referral', summary:'AI workflow automation for enterprises. Fund II Deal #3. Closed Jan 2026.', founders:'Mia Chen, David Park', traction:'$2.1M ARR, 180% YoY', concern:'—' },
  { id:13, name:'DevForge', stage:'closed', sector:'Developer Tools · Seed', amount:'$5M', check:'$2.5M', owner:'Sam', tags:['devtools'], date:'Feb 2026', source:'Cold inbound', summary:'Next-gen CI/CD and developer experience platform. Fund II Deal #4.', founders:'Lars Erikson', traction:'$800K ARR, 300% YoY', concern:'—' },

  // PASSED
  { id:14, name:'Orbit AI', stage:'passed', sector:'AI/ML · Seed', amount:'$4M', check:'—', owner:'Jordan', tags:['ai'], date:'Mar 2026', source:'Inbound', summary:'Passed: Unclear differentiation from OpenAI API wrappers. No enterprise traction.', founders:'Unknown', traction:'0 paying customers', concern:'No moat. Passed.' },
  { id:15, name:'ClearCarbon', stage:'passed', sector:'Climate · Series A', amount:'$15M', check:'—', owner:'Rafael', tags:['climate'], date:'Feb 2026', source:'LP referral', summary:'Passed: Overlaps directly with GreenPulse. Conflict of interest.', founders:'—', traction:'—', concern:'Portfolio conflict.' },
];

const STAGES = [
  { id:'sourcing', label:'Sourcing', cls:'col-sourcing' },
  { id:'firstlook', label:'First Look', cls:'col-firstlook' },
  { id:'partner', label:'Partner Mtg', cls:'col-partner' },
  { id:'dd', label:'Due Diligence', cls:'col-dd' },
  { id:'termsheet', label:'Term Sheet', cls:'col-termsheet' },
  { id:'closed', label:'Closed ✓', cls:'col-closed' },
  { id:'passed', label:'Passed', cls:'col-passed' },
];

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  let activeCount = 0, totalM = 0;

  STAGES.forEach(stage => {
    const deals = DEALS.filter(d => d.stage === stage.id);
    if (stage.id !== 'passed') activeCount += deals.length;
    deals.forEach(d => {
      const m = parseFloat(d.check.replace(/[^0-9.]/g,''));
      if (!isNaN(m) && stage.id !== 'passed') totalM += m;
    });

    const col = document.createElement('div');
    col.className = `column ${stage.cls}`;
    col.innerHTML = `
      <div class="col-header">
        <span class="col-title">${stage.label}</span>
        <span class="col-count">${deals.length}</span>
      </div>
      <div class="cards">${deals.map(d => `
        <div class="card" onclick="openModal(${d.id})">
          <div class="card-name">${d.name}</div>
          <div class="card-sector">${d.sector}</div>
          <div class="card-meta">
            <span class="card-amount">${d.check !== '—' ? d.check : '—'}</span>
            <span class="card-owner">${d.owner}</span>
          </div>
          <div class="card-tags">${d.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}</div>
          <div class="card-date">${d.date} · ${d.source}</div>
        </div>
      `).join('')}</div>
    `;
    board.appendChild(col);
  });

  document.getElementById('activeCount').textContent = activeCount;
  document.getElementById('totalAmount').textContent = '$' + totalM.toFixed(1) + 'M';
}

function openModal(id) {
  const d = DEALS.find(x => x.id === id);
  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>${d.name}</h2>
    <div class="m-sector">${d.sector}</div>
    <div class="m-row"><span class="m-label">Stage:</span><span class="m-val">${STAGES.find(s=>s.id===d.stage).label}</span></div>
    <div class="m-row"><span class="m-label">Round size:</span><span class="m-val">${d.amount}</span></div>
    <div class="m-row"><span class="m-label">Warp check:</span><span class="m-val" style="color:var(--green)">${d.check}</span></div>
    <div class="m-row"><span class="m-label">Owner:</span><span class="m-val">${d.owner}</span></div>
    <div class="m-row"><span class="m-label">Source:</span><span class="m-val">${d.source}</span></div>
    <div class="m-row"><span class="m-label">Founders:</span><span class="m-val">${d.founders}</span></div>
    <div class="m-row"><span class="m-label">Traction:</span><span class="m-val">${d.traction}</span></div>
    <div class="m-notes"><strong>Summary:</strong><br/>${d.summary}<br/><br/><strong>Key concern:</strong> ${d.concern}</div>
  `;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBg')) document.getElementById('modalBg').classList.remove('open');
}

renderBoard();
</script>
</body>
</html>
