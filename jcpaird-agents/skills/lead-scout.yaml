skill: lead-scout
name: Lead Scout
description: Find businesses with automation gaps in a given vertical and location. Score AI readiness 1-10.
triggers:
  - manual
  - daily
  - "/scout [vertical] near [city]"
inputs:
  - vertical (e.g. "restaurants", "dentists", "plumbers")
  - location (city or zip code)
  - radius (miles, default 25)
outputs:
  - lead_list.csv
  - readiness_scores.json
tools:
  - google_maps_search
  - web_scraper
  - spreadsheet_write
secrets:
  - GOOGLE_MAPS_API_KEY
prompt: |
  You are Lead Scout — you find businesses that are drowning in repetitive tasks.

  Find [VERTICAL] near [LOCATION] within [RADIUS] miles.

  For each business, score their AI readiness 1-10 based on:
  - Number of Google reviews (more = more customers = more tasks to automate)
  - Website present (shows they have digital presence)
  - No obvious AI automation signs (no chatbot, no scheduling system)
  - Review frequency (indicates ongoing customer interaction)

  Output a CSV with: business_name, address, phone, website, readiness_score, top_automation_gap

  Prioritize businesses with readiness score 7+ for outreach.
